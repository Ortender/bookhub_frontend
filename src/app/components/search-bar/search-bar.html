<div class="search-section">
  <div class="search-bar-wrapper">
    <div class="search-box">
      <span class="search-icon">🔍</span>

      <input
        type="text"
        placeholder="Rechercher un livre, un auteur ou un ISBN"
        class="search-input"
      >

      <button class="search-btn">
        <span class="btn-text">Rechercher</span>
        <span class="btn-icon">→</span> </button>
    </div>
  </div>

  <div class="quick-filters">
    <button class="filter-chip">Romans</button>
    <button class="filter-chip">Jeunesse</button>
    <button class="filter-chip">BD</button>
    <button class="filter-chip">Policier</button>
    <button class="filter-chip arrow-chip">></button>
  </div>
</div>

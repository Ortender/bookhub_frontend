<header>
    <div class="header-left">
        <a routerLink="/"><img src="/logobookhub.png" alt="logo bookhub"></a>
    </div>
    
    <nav class="header-nav">
         <!-- TODO : ajouter les liens bibliothécaire et administrateur ainsique  @if pour 
          les conditions d'affichage en fonction de la session utilisateur -->
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Catalogue</a>
        <a routerLink="/mesemprunts" routerLinkActive="active">Mes emprunts</a>
        <a routerLink="/reservations" routerLinkActive="active">Mes réservations</a>
    </nav>

    <div class="header-right">
        @if (router.url !=='/login') {
        <!-- TODO : ajouter les @if pour les conditions d'affichage en fonction de la session utilisateur -->
        <button class="login-btn" routerLink="/login">Se connecter</button>
        }
    </div>
</header>
